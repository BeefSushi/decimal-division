<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>しょうすうのわり算 ひっ算ランド</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Yomogi&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root{
    --paper:#fbf7ee; --grid:#cfe3d8; --grid-strong:#a9cdbb;
    --ink:#37464a; --ink-soft:#6b7e7f;
    --red:#e8654f; --red-soft:#f6c9bf;
    --blue:#3f8ec9; --yellow:#f4c95d;
    --green:#5fb98a; --green-deep:#3f9e6e;
    --shadow:rgba(55,70,74,.18);
    --cell:38px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html,body{margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'M PLUS Rounded 1c',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 12% 18%, #fff4d6 0 8px, transparent 9px),
      radial-gradient(circle at 88% 72%, #d9efe2 0 10px, transparent 11px),
      linear-gradient(160deg,#fdf6e3,#eef6ef);
    background-attachment:fixed;
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 30px);
    -webkit-user-select:none;user-select:none;
  }
  .wrap{max-width:460px;margin:0 auto;}

  /* ===== start screen ===== */
  #startScreen{text-align:center;padding-top:10px;}
  .start-logo{
    font-family:'Yomogi',cursive;font-weight:700;font-size:2rem;
    line-height:1.2;color:var(--ink);margin-bottom:4px;
  }
  .start-logo b{color:var(--red);}
  .start-sub{font-size:.9rem;color:var(--ink-soft);margin-bottom:22px;}
  .panel{
    background:#fff;border:3px solid var(--grid-strong);border-radius:22px;
    box-shadow:0 8px 0 var(--shadow);padding:18px 16px;margin-bottom:18px;
  }
  .panel h2{
    font-size:1rem;margin:0 0 12px;color:var(--ink);
    display:flex;align-items:center;gap:8px;justify-content:center;
  }
  .opt-grid{display:flex;flex-direction:column;gap:9px;}
  .opt{
    border:2px solid var(--grid-strong);border-radius:14px;
    background:#fbfdfb;padding:12px 14px;font-family:inherit;
    font-weight:800;font-size:1rem;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;gap:10px;text-align:left;
    transition:transform .05s;
  }
  .opt:active{transform:scale(.97);}
  .opt.sel{background:#eaf4fb;border-color:var(--blue);box-shadow:inset 0 0 0 2px var(--blue);}
  .opt .ic{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    display:grid;place-items:center;font-size:1.2rem;background:var(--yellow);
  }
  .opt .desc{display:block;font-size:.72rem;color:var(--ink-soft);font-weight:700;margin-top:2px;}
  .num-row{display:flex;gap:9px;}
  .num-row .opt{flex:1;justify-content:center;font-size:1.3rem;}
  .start-btn{
    width:100%;border:none;border-radius:18px;padding:16px 0;
    font-family:inherit;font-weight:800;font-size:1.2rem;color:#fff;
    background:var(--green);box-shadow:0 6px 0 var(--green-deep);cursor:pointer;
  }
  .start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--green-deep);}

  /* ===== game header ===== */
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .logo{font-family:'Yomogi',cursive;font-weight:700;line-height:1.15;font-size:1.25rem;color:var(--ink);}
  .logo b{color:var(--red);}
  .logo span{display:block;font-size:.7rem;color:var(--ink-soft);}
  .scoreboard{display:flex;gap:7px;flex-shrink:0;}
  .chip{
    background:#fff;border:2px solid var(--grid-strong);border-radius:14px;
    padding:5px 9px;text-align:center;box-shadow:0 3px 0 var(--shadow);min-width:54px;
  }
  .chip .k{font-size:.58rem;color:var(--ink-soft);letter-spacing:.06em;}
  .chip .v{font-size:1.15rem;font-weight:800;line-height:1;}
  .chip.score .v{color:var(--blue);}
  .chip.combo .v{color:var(--red);}
  .chip.combo.hot{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.25) rotate(-4deg)}100%{transform:scale(1)}}

  .progress-row{
    display:flex;align-items:center;gap:8px;margin-bottom:12px;
    background:#fff;border:2px dashed var(--grid-strong);border-radius:14px;padding:8px 12px;
  }
  .progress-row .qnum{font-size:.8rem;font-weight:800;color:var(--ink);white-space:nowrap;}
  .progress-row .bar{flex:1;height:9px;border-radius:6px;background:var(--grid);overflow:hidden;border:1px solid var(--grid-strong);}
  .progress-row .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-deep));width:0;transition:width .4s;}
  .progress-row .stg{font-size:.72rem;font-weight:800;color:var(--ink-soft);white-space:nowrap;}

  .note{
    position:relative;
    background:
      repeating-linear-gradient(var(--paper),var(--paper) 33px,var(--grid) 33px,var(--grid) 34px),
      repeating-linear-gradient(90deg,var(--paper),var(--paper) 33px,var(--grid) 33px,var(--grid) 34px);
    border-radius:18px;border:3px solid #fff;
    box-shadow:0 8px 0 var(--shadow), 0 0 0 3px var(--grid-strong);
    padding:18px 14px 16px;margin-bottom:14px;overflow:hidden;
  }
  .note::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:2px;background:var(--red-soft);}
  .prompt-label{font-size:.72rem;color:var(--ink-soft);font-weight:700;margin-left:14px;margin-bottom:2px;}
  .prompt{font-family:'Yomogi',cursive;font-size:1.9rem;font-weight:700;text-align:center;margin:2px 0 6px;color:var(--ink);}
  .prompt .op{color:var(--red);margin:0 .12em;}

  .step-bubble{
    background:#fff;border:2px solid var(--blue);border-radius:14px 14px 14px 4px;
    padding:8px 11px;margin:4px 0 12px;font-size:.85rem;font-weight:700;color:var(--ink);
    box-shadow:0 3px 0 rgba(63,142,201,.25);
  }
  .step-bubble .tag{display:inline-block;background:var(--blue);color:#fff;font-size:.62rem;border-radius:8px;padding:2px 6px;margin-right:6px;vertical-align:middle;}

  .calc-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .calc{display:flex;flex-direction:column;align-items:center;margin:4px auto;min-width:min-content;font-weight:700;}
  .ld{display:inline-grid;gap:2px;}
  .cell{width:var(--cell);height:var(--cell);display:grid;place-items:center;font-size:1.35rem;font-weight:800;}
  .cell.fixed{color:var(--ink);}
  .digit-input{
    width:var(--cell);height:var(--cell);background:#fffdf5;
    border:2px dashed var(--blue);border-radius:7px;
    text-align:center;font-size:1.25rem;font-weight:800;color:var(--blue);
    font-family:inherit;outline:none;padding:0;
  }
  .digit-input:focus{background:#eaf4fb;border-style:solid;}
  .digit-input.good{border-color:var(--green);background:#e7f7ee;color:var(--green-deep);border-style:solid;}
  .digit-input.bad{border-color:var(--red);background:#fdeae6;animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  /* 小数点マス（タップで点を置く） */
  .dot-slot{
    width:16px;height:var(--cell);display:grid;place-items:end center;
    cursor:pointer;padding-bottom:4px;
  }
  .dot-slot .dotmark{
    width:10px;height:10px;border-radius:50%;background:transparent;
    border:2px dashed var(--red-soft);transition:.12s;
  }
  .dot-slot.on .dotmark{background:var(--red);border-color:var(--red);}
  .dot-slot.good .dotmark{background:var(--green);border-color:var(--green);}
  .dot-slot.bad .dotmark{border-color:var(--red);border-style:solid;animation:shake .3s;}

  .divider-bracket{border-top:3px solid var(--ink);border-left:3px solid var(--ink);border-top-left-radius:10px;}
  .overbar{border-top:3px solid var(--ink);}
  .subline-cell{border-top:2px solid var(--ink);}

  .keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:4px;}
  .key{
    border:2px solid var(--grid-strong);border-radius:14px;padding:14px 0;
    font-family:inherit;font-weight:800;font-size:1.4rem;background:#fff;color:var(--ink);
    cursor:pointer;box-shadow:0 4px 0 var(--shadow);transition:transform .05s;
  }
  .key:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}
  .key.del{background:var(--red-soft);border-color:var(--red);color:var(--red);}

  .actions{display:flex;gap:9px;margin-top:12px;}
  .btn{flex:1;border:none;border-radius:16px;padding:15px 0;font-family:inherit;font-weight:800;font-size:1.05rem;cursor:pointer;box-shadow:0 5px 0 var(--shadow);transition:transform .05s;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .btn.check{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-deep);}
  .btn.skip{background:#fff;color:var(--ink-soft);border:2px solid var(--grid-strong);flex:0 0 96px;}

  .hint{text-align:center;font-size:.76rem;color:var(--ink-soft);margin-top:4px;}

  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 20px);
    transform:translateX(-50%) translateY(140px);
    background:#fff;border-radius:18px;padding:13px 20px;
    box-shadow:0 8px 24px rgba(0,0,0,.2);border:3px solid var(--green);
    font-weight:800;font-size:1.05rem;color:var(--green-deep);
    display:flex;align-items:center;gap:9px;transition:transform .35s cubic-bezier(.2,1.3,.4,1);
    z-index:60;max-width:88%;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.miss{border-color:var(--red);color:var(--red);}
  .toast .emo{font-size:1.4rem;}
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;}
  .conf{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform;}

  /* ===== result screen ===== */
  #resultScreen{text-align:center;padding-top:24px;}
  .result-medal{font-size:4rem;margin-bottom:6px;}
  .result-title{font-family:'Yomogi',cursive;font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:16px;}
  .result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:22px;}
  .stat-card{background:#fff;border:3px solid var(--grid-strong);border-radius:18px;padding:16px 20px;box-shadow:0 6px 0 var(--shadow);}
  .stat-card .sk{font-size:.72rem;color:var(--ink-soft);font-weight:700;}
  .stat-card .sv{font-size:2rem;font-weight:800;color:var(--blue);line-height:1.1;}
  .stat-card.combo .sv{color:var(--red);}

  .hide{display:none !important;}
</style>
</head>
<body>

<!-- ===== スタート画面 ===== -->
<div class="wrap" id="startScreen">
  <div class="start-logo">しょうすうの<b>わり算</b><br>ひっ算ランド ✏️</div>
  <div class="start-sub">ステージと もんだいの数を えらんでね</div>

  <div class="panel">
    <h2>🎯 ステージを えらぶ</h2>
    <div class="opt-grid" id="stageOpts"></div>
  </div>

  <div class="panel">
    <h2>🔢 もんだいの数</h2>
    <div class="num-row" id="countOpts"></div>
  </div>

  <button class="start-btn" id="startBtn">スタート！</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div class="wrap hide" id="gameScreen">
  <header>
    <div class="logo">しょうすうの<b>わり算</b><span>ひっ算ランド</span></div>
    <div class="scoreboard">
      <div class="chip score"><div class="k">スコア</div><div class="v" id="scoreV">0</div></div>
      <div class="chip combo" id="comboChip"><div class="k">れんぞく</div><div class="v" id="comboV">0</div></div>
    </div>
  </header>

  <div class="progress-row">
    <span class="qnum"><span id="qNow">1</span>/<span id="qTotal">10</span>問</span>
    <div class="bar"><div class="fill" id="qFill"></div></div>
    <span class="stg" id="stgLabel">わりきれる</span>
  </div>

  <div class="note">
    <div class="prompt-label">▼ この計算を ひっ算で ときましょう</div>
    <div class="prompt" id="promptText"></div>
    <div class="step-bubble" id="stepBubble">
      <span class="tag" id="stepTag">STEP</span><span id="stepMsg"></span>
    </div>
    <div class="calc-scroll"><div class="calc" id="calcArea"></div></div>
    <div class="hint" id="hintText"></div>
  </div>

  <div class="keypad" id="keypad"></div>

  <div class="actions">
    <button class="btn skip" id="skipBtn">パス</button>
    <button class="btn check" id="checkBtn">こたえあわせ</button>
  </div>
</div>

<!-- ===== リザルト画面 ===== -->
<div class="wrap hide" id="resultScreen">
  <div class="result-medal" id="resultMedal">🏅</div>
  <div class="result-title" id="resultTitle">おつかれさま！</div>
  <div class="result-stats">
    <div class="stat-card"><div class="sk">せいかい</div><div class="sv" id="resCorrect">0</div></div>
    <div class="stat-card"><div class="sk">スコア</div><div class="sv" id="resScore">0</div></div>
    <div class="stat-card combo"><div class="sk">最高れんぞく</div><div class="sv" id="resCombo">0</div></div>
  </div>
  <button class="start-btn" id="againBtn">もういちど あそぶ</button>
</div>

<div class="toast" id="toast"><span class="emo">🎉</span><span id="toastMsg"></span></div>
<div class="confetti" id="confetti"></div>

<script>
/* ============================================================
   しょうすうのわり算 ひっ算ランド (iPhone対応)
   ステージ選択 / 問題数選択 / 小数点は自分でタップ /
   途中のかけ算・ひき算もマス入力 / リザルト画面
   ============================================================ */

const STAGES = [
  { key:'s1', medal:'🌱', name:'わりきれる',   desc:'整数でわる・商も小数', gen: genWholeDivisorExact },
  { key:'s2', medal:'🌿', name:'小数でわる',   desc:'小数点を1つ動かす',    gen: genDecimalDivisorExact },
  { key:'s3', medal:'🌼', name:'0.□でわる',    desc:'小数点を1つ動かす',    gen: genSmallDivisorExact },
  { key:'s4', medal:'⭐', name:'けたをのばす', desc:'商が2けたになる',      gen: genTwoDigitQuotient },
  { key:'mix',medal:'👑', name:'ミックス',     desc:'ぜんぶまぜて出題',     gen: genMixed },
];
const COUNTS = [5,10,20];

let chosenStage = 0;
let chosenCount = 1; // index of COUNTS

let game = {
  total:10, qIndex:0,
  score:0, combo:0, bestCombo:0, correctCount:0,
  problem:null,
};

/* ---------- utilities ---------- */
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function tidy(num){ return (Math.round(num*100)/100).toString(); }
function decPlaces(s){const i=s.indexOf('.');return i<0?0:s.length-i-1;}
function scaleString(s, k){
  if(s.startsWith('-')) s=s.slice(1);
  let [intP, fracP=''] = s.split('.');
  let digits = intP + fracP;
  let pointPos = intP.length + k;
  if(pointPos >= digits.length){
    digits = digits + '0'.repeat(pointPos - digits.length);
    return { str: stripZero(digits), dec: 0 };
  }else if(pointPos <= 0){
    let z = '0'.repeat(-pointPos);
    return { str: '0.' + z + digits, dec: (z+digits).length };
  }else{
    let i = digits.slice(0,pointPos), f = digits.slice(pointPos);
    return { str: stripZero(i) + (f? '.'+f : ''), dec: f.length };
  }
}
function stripZero(s){ let r = s.replace(/^0+/,''); return r===''?'0':r; }

/* ---------- generators (割り切れ保証) ---------- */
function genWholeDivisorExact(){
  let B,q10,A10,a;
  do { B=rnd(2,9); q10=rnd(11,49); A10=B*q10; a=(A10/10).toFixed(1); }
  while(q10%10===0 || A10%10===0);
  return finalize(a, String(B));
}
function genDecimalDivisorExact(){
  let Bdec,q,a;
  do { Bdec=(rnd(11,49)/10).toFixed(1); q=rnd(2,7); a=tidy(Math.round(parseFloat(Bdec)*q*10)/10); }
  while(parseFloat(Bdec)%1===0);
  return finalize(a, Bdec);
}
function genSmallDivisorExact(){
  const Bd=rnd(2,9), b=(Bd/10).toFixed(1), q=rnd(3,15);
  return finalize(tidy((Bd/10)*q), b);
}
function genTwoDigitQuotient(){
  let a,b;
  if(Math.random()<0.5){
    const Bd=rnd(2,9); b=(Bd/10).toFixed(1); const q=rnd(12,68); a=tidy((Bd/10)*q);
  }else{
    const Bdec=(rnd(11,29)/10).toFixed(1); const q=rnd(11,39); a=tidy(parseFloat(Bdec)*q); b=Bdec;
  }
  return finalize(a,b);
}
function genMixed(){
  const pool=[genWholeDivisorExact,genDecimalDivisorExact,genSmallDivisorExact,genTwoDigitQuotient];
  return pool[rnd(0,pool.length-1)]();
}

/* ---------- finalize: 筆算の全ステップを構築 ----------
   割り算を整数化し、長除法のステップ（おろす→かけ算→ひき算）を作る。
   返す problem:
     a,b           表示する元の数
     shift         小数点を動かす桁数
     aShown,bShown 整数化後の表示文字列
     digits        整数化わられる数の各桁文字 配列
     B             整数化わる数
     qDigits       商の各桁(整数。先頭0なし) 配列 of 数字文字
     dotIndexInQ   商のどの桁の「前」に小数点が入るか(0=なし, k=右からk桁前)
     steps         各商桁ごと {qd, prod, sub} 文字列
   ------------------------------------------------------- */
function finalize(a,b){
  const shift = decPlaces(b);
  const aS = scaleString(a, shift);
  const bS = scaleString(b, shift);
  const B  = parseInt(bS.str,10);

  // わられる数(整数化後)の小数桁を取り除いて純粋な整数列にする
  // ただし商の小数点位置のため、aShownの小数桁を記録
  const aShownDec = aS.dec;
  const aIntStr = aS.str.replace('.','');     // 例 "12.5" -> "125"
  const Afull = parseInt(aIntStr,10);

  // 長除法
  const digits = aIntStr.split('');
  let qDigitsRaw = [];   // 各位の商(先頭0含む)
  let steps = [];        // {qd, prod, sub, bring}
  let cur = 0;
  for(let i=0;i<digits.length;i++){
    cur = cur*10 + parseInt(digits[i],10);
    const qd = Math.floor(cur/B);
    const prod = qd*B;
    const sub = cur - prod;
    qDigitsRaw.push(qd);
    steps.push({ qd:String(qd), prod:String(prod), sub:String(sub), broughtTo:cur });
    cur = sub;
  }

  // 先頭の不要な0を消した商
  let firstNonZero = 0;
  while(firstNonZero < qDigitsRaw.length-1 && qDigitsRaw[firstNonZero]===0) firstNonZero++;
  const qDigits = qDigitsRaw.slice(firstNonZero).map(String);

  // 商の小数点位置（右からaShownDec桁前）
  const dotFromRight = aShownDec;

  return {
    a, b, shift,
    aShown: aS.str, bShown: bS.str,
    digits, B,
    qDigits, dotFromRight,
    qDigitsRawLen: qDigitsRaw.length,
    firstNonZero,
    steps,
  };
}

/* ---------- input state ---------- */
let inputs = [];     // {el, expect}  数字入力マス
let dotSlots = [];   // {el, correct(bool)} 小数点スロット
let activeInput = 0;

/* ---------- screen control ---------- */
function show(id){
  ['startScreen','gameScreen','resultScreen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hide', s!==id);
  });
}

/* ---------- build start screen ---------- */
function buildStart(){
  const sw=document.getElementById('stageOpts');
  sw.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(i===chosenStage?' sel':'');
    b.innerHTML=`<span class="ic">${s.medal}</span><span>${s.name}<span class="desc">${s.desc}</span></span>`;
    b.onclick=()=>{ chosenStage=i; buildStart(); };
    sw.appendChild(b);
  });
  const cw=document.getElementById('countOpts');
  cw.innerHTML='';
  COUNTS.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(i===chosenCount?' sel':'');
    b.textContent=n+'問';
    b.onclick=()=>{ chosenCount=i; buildStart(); };
    cw.appendChild(b);
  });
}

/* ---------- start game ---------- */
function startGame(){
  game = {
    total: COUNTS[chosenCount], qIndex:0,
    score:0, combo:0, bestCombo:0, correctCount:0, problem:null,
  };
  document.getElementById('qTotal').textContent=game.total;
  document.getElementById('stgLabel').textContent=STAGES[chosenStage].name;
  show('gameScreen');
  nextProblem();
}

function nextProblem(){
  if(game.qIndex>=game.total){ showResult(); return; }
  game.problem = STAGES[chosenStage].gen();
  renderProblem();
  updateHud();
}

/* ---------- render problem ---------- */
function renderProblem(){
  const p=game.problem;
  document.getElementById('promptText').innerHTML =
    `${p.a}<span class="op">÷</span>${p.b}<span class="op">＝</span>?`;

  const needShift = p.shift>0;
  document.getElementById('stepTag').textContent = needShift?'コツ':'STEP';
  document.getElementById('stepMsg').textContent = needShift
    ? `わる数を ${p.shift}つ うごかして「${p.bShown}」に。わられる数も おなじだけ うごかすよ`
    : `商を立てて、かけ算と ひき算の答えも マスに入れてね`;

  document.getElementById('hintText').textContent = p.dotFromRight>0
    ? '答えに小数点が入るよ。上の小さい○を タップして 点を 打ってね'
    : 'マスを 左から じゅんばんに うめていこう';

  buildCalc();
}

/* ---------- build the long-division grid ----------
   レイアウト（列は整数化わられる数の桁数 + 左1列）:
     行1: [空] 商マス... （小数点スロットを桁間に差し込む）
     行2: わる数 ) わられる数（オーバーバー）
     行3以降: 各ステップの かけ算の答え と ひき算の答え（右寄せ）
   かけ算/ひき算は最初の有効桁から始まる。簡略のため各ステップを
   「その位置までの部分」に右寄せ配置する。
   ------------------------------------------------------- */
function buildCalc(){
  const p=game.problem;
  const area=document.getElementById('calcArea');
  area.innerHTML='';
  inputs=[]; dotSlots=[]; activeInput=0;

  const nCols = p.digits.length;        // 整数化わられる数の桁数
  const cellPx = 38;

  // ----- 行1: 商 -----
  // 商は各桁を「対応するわられる数の桁の上」に置く（標準長除法）。
  // qDigitsRaw（先頭0含む）を桁位置に対応させる。
  // 先頭0は空マスにする。
  const row1 = document.createElement('div');
  row1.className='ld';
  row1.style.gridTemplateColumns=`${cellPx}px repeat(${nCols}, ${cellPx}px)`;
  // 左端空白
  row1.appendChild(blankCell());
  // 商マス（各列）
  for(let col=0; col<nCols; col++){
    const raw = p.qDigitsRawLen - nCols + col; // 通常 qDigitsRawLen===nCols
    const isLeadingZero = (col < p.firstNonZero);
    if(isLeadingZero){
      row1.appendChild(blankCell());
    }else{
      const expect = p.steps[col].qd;
      const inp=mkInput(expect);
      row1.appendChild(inp);
    }
  }
  area.appendChild(row1);

  // ----- 小数点スロットの行（行1と行2の間） -----
  // 商の小数点は「右からdotFromRight桁前」。列でいうと nCols-dotFromRight の前。
  if(p.dotFromRight>0){
    const dotRow=document.createElement('div');
    dotRow.className='ld';
    dotRow.style.gridTemplateColumns=`${cellPx}px repeat(${nCols}, ${cellPx}px)`;
    dotRow.style.marginTop='-6px';
    dotRow.style.marginBottom='-6px';
    dotRow.appendChild(blankCell(16));
    const dotCol = nCols - p.dotFromRight; // この列の「左境界」に点
    for(let col=0; col<nCols; col++){
      // 点は dotCol 番目のマスの左に置きたいので、(dotCol-1)列の右端に小さなスロット
      if(col === dotCol-1 && col>=p.firstNonZero-1){
        const slot=mkDotSlot();
        // セル内の右端に寄せる
        const wrap=document.createElement('div');
        wrap.style.width=cellPx+'px';wrap.style.height='14px';
        wrap.style.display='flex';wrap.style.justifyContent='flex-end';
        wrap.appendChild(slot);
        dotRow.appendChild(wrap);
      }else{
        const sp=document.createElement('div');
        sp.style.width=cellPx+'px';sp.style.height='14px';
        dotRow.appendChild(sp);
      }
    }
    // 行1の直後に挿入したいので、area先頭付近に入れ直す
    area.insertBefore(dotRow, row1.nextSibling);
  }

  // ----- 行2: わる数 ) わられる数 -----
  const row2=document.createElement('div');
  row2.className='ld';
  row2.style.gridTemplateColumns=`${cellPx}px repeat(${nCols}, ${cellPx}px)`;
  const dCell=document.createElement('div');
  dCell.className='cell fixed';
  dCell.style.justifyContent='flex-end';
  dCell.textContent=p.bShown;
  row2.appendChild(dCell);
  for(let col=0; col<nCols; col++){
    const cell=document.createElement('div');
    cell.className='cell fixed '+(col===0?'divider-bracket':'overbar');
    cell.textContent=p.digits[col];
    row2.appendChild(cell);
  }
  area.appendChild(row2);

  // ----- 各ステップ: かけ算の答え と ひき算の答え -----
  // 標準筆算では各段は1〜2桁で、対応する位の下に右寄せされる。
  // ここでは簡略化し、各有効ステップについて
  //   prod(かけ算の答え) を「その位までの列」に右寄せ入力
  //   sub(ひき算の答え) を同じ右端列に入力（下線つき）
  // を縦に積む。
  for(let col=p.firstNonZero; col<nCols; col++){
    const st=p.steps[col];
    // この段の右端列 = col。左端 = col - (prod.length-1)
    // prod行
    const prodRow=document.createElement('div');
    prodRow.className='ld';
    prodRow.style.gridTemplateColumns=`${cellPx}px repeat(${nCols}, ${cellPx}px)`;
    prodRow.appendChild(blankCell());
    const prodStr=st.prod;
    const prodStart=col-(prodStr.length-1);
    for(let c=0;c<nCols;c++){
      if(c>=prodStart && c<=col){
        const idx=c-prodStart;
        prodRow.appendChild(mkInput(prodStr[idx]));
      }else{
        prodRow.appendChild(blankCell());
      }
    }
    area.appendChild(prodRow);

    // sub行（ひき算の答え, 下線つき）
    const subRow=document.createElement('div');
    subRow.className='ld';
    subRow.style.gridTemplateColumns=`${cellPx}px repeat(${nCols}, ${cellPx}px)`;
    subRow.appendChild(blankCell());
    const subStr=st.sub; // ひき算の答え(0〜)
    // 表示桁: 右端col。長さsubStr.length。ただし0なら1桁"0"。
    const subStart=col-(subStr.length-1);
    for(let c=0;c<nCols;c++){
      const cell=document.createElement('div');
      // 下線は prod の範囲に引く
      if(c>=prodStart && c<=col){ cell.className='subline-cell'; cell.style.width=cellPx+'px';cell.style.height=cellPx+'px'; }
      else { cell.style.width=cellPx+'px';cell.style.height=cellPx+'px'; }
      if(c>=subStart && c<=col){
        const idx=c-subStart;
        const inp=mkInput(subStr[idx]);
        inp.classList.add('subline-cell');
        cell.replaceWith(inp);
        subRow.appendChild(inp);
        continue;
      }
      subRow.appendChild(cell);
    }
    area.appendChild(subRow);
  }

  // フォーカス初期化
  if(inputs.length) setActive(0);
  buildKeypad();
}

function blankCell(w){
  const d=document.createElement('div');
  d.className='cell';
  if(w){d.style.width=w+'px';}
  return d;
}
function mkInput(expect){
  const inp=document.createElement('input');
  inp.className='digit-input';
  inp.maxLength=1; inp.inputMode='none'; inp.readOnly=true;
  const myIndex=inputs.length;
  inp.dataset.idx=myIndex;
  inp.addEventListener('click',()=>setActive(myIndex));
  inputs.push({el:inp, expect:String(expect)});
  return inp;
}
function mkDotSlot(){
  const slot=document.createElement('div');
  slot.className='dot-slot';
  slot.innerHTML='<div class="dotmark"></div>';
  const obj={el:slot, on:false};
  slot.addEventListener('click',()=>{
    obj.on=!obj.on;
    slot.classList.toggle('on',obj.on);
    slot.classList.remove('good','bad');
  });
  dotSlots.push(obj);
  return slot;
}

function setActive(i){
  activeInput=i;
  inputs.forEach((o,k)=>{ o.el.style.boxShadow = k===i?'0 0 0 3px var(--yellow)':'none'; });
}

/* ---------- keypad ---------- */
function buildKeypad(){
  const kp=document.getElementById('keypad');
  kp.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','0'].forEach(n=>{
    const b=document.createElement('button');
    b.className='key'; b.textContent=n;
    b.onclick=()=>pressDigit(n);
    kp.appendChild(b);
  });
  const del=document.createElement('button');
  del.className='key del'; del.textContent='⌫';
  del.onclick=()=>pressDel();
  // 5列x2行=10数字、最後の行に0と⌫が入るよう0を9の隣に。ここでは0の後に⌫追加。
  kp.appendChild(del);
}
function pressDigit(n){
  const o=inputs[activeInput]; if(!o) return;
  o.el.value=n; o.el.classList.remove('good','bad');
  if(activeInput<inputs.length-1) setActive(activeInput+1);
}
function pressDel(){
  const o=inputs[activeInput]; if(!o) return;
  if(o.el.value==='' && activeInput>0) setActive(activeInput-1);
  inputs[activeInput].el.value=''; inputs[activeInput].el.classList.remove('good','bad');
}

/* ---------- check ---------- */
function checkAnswer(){
  const p=game.problem;
  let allOk=true;

  // 数字マス
  inputs.forEach(o=>{
    if(o.el.value.trim()===o.expect){ o.el.classList.add('good'); o.el.classList.remove('bad'); }
    else { o.el.classList.add('bad'); o.el.classList.remove('good'); allOk=false; }
  });

  // 小数点スロット（dotFromRight>0のとき、正しいスロットだけonであるべき）
  if(p.dotFromRight>0){
    dotSlots.forEach(o=>{
      // スロットは1つだけ作っている（正しい位置）→ onなら正解
      if(o.on){ o.el.classList.add('good'); o.el.classList.remove('bad'); }
      else { o.el.classList.add('bad'); o.el.classList.remove('good'); allOk=false; }
    });
  }

  if(allOk && inputs.every(o=>o.el.value!=='')) onCorrect();
  else onWrong();
}

function onCorrect(){
  game.combo++; game.bestCombo=Math.max(game.bestCombo,game.combo);
  game.correctCount++;
  const gain=100+(game.combo-1)*20;
  game.score+=gain;
  game.qIndex++;
  bumpScore(); comboPulse();
  const msgs=['せいかい！','すごい！','ばっちり！','やった！','かんぺき！'];
  const extra = game.combo>=3?` ${game.combo}れんぞく🔥`:'';
  toast(`${msgs[rnd(0,msgs.length-1)]} +${gain}点${extra}`,'win');
  confetti(game.combo>=3?40:22);
  updateHud();
  setTimeout(nextProblem, 1100);
}
function onWrong(){
  game.combo=0; comboPulse(true);
  toast('おしい！ 赤いマスを 見なおそう','miss');
  updateHud();
}

/* ---------- result ---------- */
function showResult(){
  show('resultScreen');
  const pct=game.correctCount/game.total;
  let medal='🥉', title='よくがんばったね！';
  if(pct>=1){ medal='👑'; title='ぜんもん せいかい！'; }
  else if(pct>=0.8){ medal='🥇'; title='すばらしい！'; }
  else if(pct>=0.5){ medal='🥈'; title='いいちょうし！'; }
  document.getElementById('resultMedal').textContent=medal;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resCorrect').textContent=`${game.correctCount}/${game.total}`;
  document.getElementById('resScore').textContent=game.score;
  document.getElementById('resCombo').textContent=game.bestCombo;
  confetti(pct>=0.8?100:40);
}

/* ---------- HUD ---------- */
function updateHud(){
  document.getElementById('qNow').textContent=Math.min(game.qIndex+1,game.total);
  document.getElementById('qFill').style.width=(game.qIndex/game.total*100)+'%';
  document.getElementById('scoreV').textContent=game.score;
  document.getElementById('comboV').textContent=game.combo;
}
function bumpScore(){
  const el=document.getElementById('scoreV');
  el.style.transition='transform .2s'; el.style.transform='scale(1.4)';
  setTimeout(()=>el.style.transform='scale(1)',200);
  el.textContent=game.score;
}
function comboPulse(reset){
  const chip=document.getElementById('comboChip');
  document.getElementById('comboV').textContent=game.combo;
  if(reset)return;
  chip.classList.remove('hot'); void chip.offsetWidth; chip.classList.add('hot');
}

/* ---------- toast & confetti ---------- */
let toastTimer;
function toast(msg,type){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.querySelector('.emo').textContent = type==='miss'?'🤔':'🎉';
  t.classList.toggle('miss',type==='miss');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}
function confetti(n){
  const box=document.getElementById('confetti');
  const colors=['#e8654f','#f4c95d','#5fb98a','#3f8ec9','#f6c9bf'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.background=colors[rnd(0,colors.length-1)];
    c.style.left=rnd(8,92)+'%'; c.style.top='-20px';
    const dx=rnd(-110,110), dur=rnd(1200,2200), rot=rnd(180,720);
    c.style.transition=`transform ${dur}ms ease-in, opacity ${dur}ms`;
    box.appendChild(c);
    requestAnimationFrame(()=>{
      c.style.transform=`translate(${dx}px, ${rnd(window.innerHeight*0.6,window.innerHeight)}px) rotate(${rot}deg)`;
      c.style.opacity='0';
    });
    setTimeout(()=>c.remove(),dur+100);
  }
}

/* ---------- events ---------- */
document.getElementById('startBtn').onclick=startGame;
document.getElementById('againBtn').onclick=()=>{ buildStart(); show('startScreen'); };
document.getElementById('checkBtn').onclick=checkAnswer;
document.getElementById('skipBtn').onclick=()=>{ game.combo=0; game.qIndex++; updateHud(); nextProblem(); };

document.addEventListener('keydown',e=>{
  if(document.getElementById('gameScreen').classList.contains('hide')) return;
  if(e.key>='0'&&e.key<='9') pressDigit(e.key);
  else if(e.key==='Backspace'){ e.preventDefault(); pressDel(); }
  else if(e.key==='Enter') checkAnswer();
});

/* ---------- init ---------- */
buildStart();
show('startScreen');
</script>
</body>
